<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Google OAuth2 Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #output { background: #f4f4f4; padding: 10px; border: 1px solid #ddd; margin-top: 20px; white-space: pre-wrap; }
        .note { color: #666; font-size: 0.9em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Test Google OAuth2 Login</h1>
    <div class="note">
        <strong>Important:</strong> You must replace <code>YOUR_GOOGLE_CLIENT_ID</code> in this file with your actual Google Client ID.<br>
        Make sure <code>http://localhost:8080</code> is added to "Authorized JavaScript origins" in your Google Cloud Console.
    </div>

    <!-- Google Sign-In Button Container -->
    <div id="g_id_onload"
         data-client_id="417783566408-gkjfdkul77gk8e6ljv77jiojaeqds6p6.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>

    <h3>Backend Response:</h3>
    <div id="output">Waiting for login...</div>

    <script>
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            document.getElementById('output').innerText = "Sending token to backend...";

            // Send the ID token to your Spring Boot backend
            fetch('http://localhost:8080/headhunt/api/v1/auth/google/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ idToken: response.credential })
            })
            .then(async res => {
                const data = await res.json();
                const status = res.status;
                const resultText = `Status: ${status}\n\nResponse:\n${JSON.stringify(data, null, 2)}`;
                document.getElementById('output').innerText = resultText;

                if (status === 202) {
                    alert("User not found! This is where the frontend would redirect to the registration page.");
                } else if (status === 200) {
                    alert("Login Successful! Access Token received.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('output').innerText = 'Error: ' + error.message;
            });
        }
    </script>
</body>
</html>
