<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 Login Test Hub</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
        }

        .login-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .provider-card {
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .provider-card h2 {
            margin-top: 0;
            color: #333;
        }

        #output {
            background: #f4f4f4;
            padding: 15px;
            border: 1px solid #ccc;
            margin-top: 30px;
            white-space: pre-wrap;
            word-break: break-all;
            text-align: left;
            min-height: 100px;
            display: none;
        }

        /* LinkedIn Button Styling to match Google's standard height/feel */
        .btn-linkedin {
            background-color: #0a66c2;
            color: #fff;
            border: 0;
            height: 40px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .btn-linkedin:hover {
            background-color: #004182;
        }

        /* Wrapper to constrain Google button width */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <h1>Social Login Testing Hub</h1>
    <p>Select a provider to test the backend OAuth2 flows.</p>

    <div class="login-container">
        <!-- Google Provider -->
        <div class="provider-card">
            <h2>Google</h2>
            <p style="color: #666; font-size: 0.85em; margin-bottom: 20px;">Implicit Flow (ID Token Verification)</p>
            <div class="google-btn-wrapper" id="google-btn-wrapper">
                <!-- Button will be rendered here dynamically via JS once config loads -->
            </div>
        </div>

        <!-- LinkedIn Provider -->
        <div class="provider-card">
            <h2>LinkedIn</h2>
            <p style="color: #666; font-size: 0.85em; margin-bottom: 20px;">Authorization Code Flow (Token Exchange)</p>
            <button class="btn-linkedin" onclick="startLinkedInLogin()">Sign in with LinkedIn</button>
        </div>
    </div>

    <div id="output"></div>

    <script>
        // ---------------------------------------------------------
        // GENERAL CONFIGURATION
        // ---------------------------------------------------------
        const BACKEND_BASE_URL = 'http://localhost:8080/headhunt/api/v1/auth';
        const OUTPUT_DIV = document.getElementById('output');

        function displayOutput(title, content) {
            OUTPUT_DIV.style.display = 'block';
            OUTPUT_DIV.innerHTML = `<strong>${title}</strong><br><br>${content}`;
        }

        // ---------------------------------------------------------
        // GOOGLE AUTH LOGIC
        // ---------------------------------------------------------
        function handleGoogleResponse(response) {
            displayOutput("Google Auth", "JWT ID Token received from Google. Sending to backend...");

            fetch(`${BACKEND_BASE_URL}/google/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: response.credential })
            })
                .then(handleBackendVerification)
                .catch(err => displayOutput("Error", err.message));
        }

        // ---------------------------------------------------------
        // LINKEDIN AUTH LOGIC
        // ---------------------------------------------------------
        let LINKEDIN_CLIENT_ID = ""; // Will be populated dynamically
        const LINKEDIN_REDIRECT_URI = "http://localhost:8080/headhunt/oauth2-login-test.html";

        function startLinkedInLogin() {
            if (!LINKEDIN_CLIENT_ID) {
                alert("Config is still loading... please wait a moment.");
                return;
            }
            const scope = "openid profile email";
            const state = Math.random().toString(36).substring(7);
            const authUrl = `https://www.linkedin.com/oauth/v2/authorization?response_type=code&client_id=${LINKEDIN_CLIENT_ID}&redirect_uri=${encodeURIComponent(LINKEDIN_REDIRECT_URI)}&state=${state}&scope=${encodeURIComponent(scope)}`;
            // Redirects to LinkedIn
            window.location.href = authUrl;
        }

        // Intercept LinkedIn redirect back to this page and fetch dynamic config
        window.onload = async function () {
            // First fetch the Oauth IDs securely from the backend
            try {
                const configRes = await fetch(`${BACKEND_BASE_URL}/social-config`);
                const configData = await configRes.json();
                const config = configData.result;

                LINKEDIN_CLIENT_ID = config.linkedinClientId;

                // Initialize Google Manually using the fetched credentials
                if (window.google) {
                    google.accounts.id.initialize({
                        client_id: config.googleClientId,
                        callback: handleGoogleResponse,
                        auto_prompt: false
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("google-btn-wrapper"),
                        { theme: "outline", size: "large", type: "standard", shape: "rectangular", text: "signin_with", logo_alignment: "left" }
                    );
                }
            } catch (err) {
                displayOutput("Config Error", "Failed to fetch OAuth configuration from backend: " + err.message);
                return;
            }

            // Handle LinkedIn Redirect Logic
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');

            if (error) {
                displayOutput("LinkedIn Error", `Error: ${error}\nDescription: ${urlParams.get('error_description')}`);
            } else if (code) {
                // Clear URL params so refresh doesn't replay the code
                window.history.replaceState({}, document.title, window.location.pathname);
                displayOutput("LinkedIn Auth", `Authorization Code received: ${code}\n\nExchanging for token on backend...`);

                fetch(`${BACKEND_BASE_URL}/linkedin/oauth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, redirectUri: LINKEDIN_REDIRECT_URI })
                })
                    .then(handleBackendVerification)
                    .catch(err => displayOutput("Error", err.message));
            }
        };

        // ---------------------------------------------------------
        // BACKEND VERIFICATION REPORTING
        // ---------------------------------------------------------
        async function handleBackendVerification(res) {
            const status = res.status;
            let data = {};
            try { data = await res.json(); } catch (e) { }

            let message = `Backend replied with HTTP ${status}\n\n`;
            message += JSON.stringify(data, null, 2);

            displayOutput(`Backend Verification Result (HTTP ${status})`, message);

            // Give the browser a moment to render the JSON before popping the alert
            setTimeout(() => {
                if (status === 200) alert("Authentication Successful! (HTTP 200)");
                else if (status === 202) alert("User is new. Proceed to Registration! (HTTP 202)");
                else alert(`Failed with status ${status}`);
            }, 50);
        }
    </script>
</body>

</html>
